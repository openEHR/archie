version: v1.0
name: Java
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2404
blocks:
  - name: Gradle
    task:
      jobs:
        - name: Java 11 build
          commands:
            - sem-version java 11
            - ./gradlew clean build
        - name: Java 17 build
          commands:
            - sem-version java 17
            - ./gradlew clean build
            - ./gradlew jacocoRootReport
            - pip install codecov-cli
            - export PATH="$(python3 -m site --user-base)/bin:$PATH"
            - codecovcli --verbose upload-process --disable-search -t "$ARCHIE_CODECOV_TOKEN" -n "java17-$SEMAPHORE_WORKFLOW_ID" -f ./build/reports/jacoco/jacocoRootReport/jacocoRootReport.xml
      prologue:
        commands:
          - checkout
      secrets:
        - name: Archie codecov token
